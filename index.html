<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        .split-view {
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100vw;
            height: 100vh;
        }

        .panel {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #videoElement {
            display: none;
        }

        #canvasElement {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #memeImage {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
        }

        #toggleOverlay {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: #00FF00;
            border: 2px solid #00FF00;
            padding: 10px 20px;
            font-size: 16px;
            font-family: monospace;
            cursor: pointer;
            border-radius: 5px;
            transition: all 0.2s;
        }

        #toggleOverlay:hover {
            background: rgba(0, 255, 0, 0.2);
            box-shadow: 0 0 10px #00FF00;
        }

        #toggleOverlay.off {
            color: #FF0000;
            border-color: #FF0000;
        }

        #toggleOverlay.off:hover {
            background: rgba(255, 0, 0, 0.2);
            box-shadow: 0 0 10px #FF0000;
        }

        #faceDebug {
            position: fixed;
            top: 72px;
            left: 20px;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.72);
            color: #00FF00;
            border: 1px solid rgba(0, 255, 0, 0.5);
            padding: 8px 10px;
            font-size: 12px;
            font-family: monospace;
            border-radius: 5px;
            white-space: pre;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <button id="toggleOverlay">TRACKING: ON</button>
    <div id="faceDebug">tongue: 0.00\njaw: 0.00\nmouth: 0.00</div>
    
    <div class="split-view">
        <div class="panel">
            <video id="videoElement" autoplay playsinline></video>
            <canvas id="canvasElement"></canvas>
        </div>
        
        <div class="panel">
            <img id="memeImage" src="blank.jpg" alt="">
        </div>
    </div>

    <script type="module">
        import { FaceLandmarker, HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14';

        // Configuration
        const DISTANCE_THRESHOLD = 0.08;
        const HANDS_TOGETHER_THRESHOLD = 0.25; // Distance threshold for palms being together (increased)
        const VIDEO_WIDTH = 640;
        const VIDEO_HEIGHT = 480;
        const GESTURE_HISTORY_SIZE = 5; // Increased for better smoothing
        const NO_HAND_THRESHOLD = 8; // Need 8 consecutive frames with no hand to show blank
        const MOUTH_OPEN_WIDE_THRESHOLD = 0.52; // Normalized mouth openness ratio
        const TONGUE_OUT_THRESHOLD = 0.08; // Lowered for better real-world tongue detection
        const TONGUE_MOUTH_OPEN_MIN = 0.22; // Require some mouth openness to reduce false positives
        const JAW_OPEN_THRESHOLD = 0.45; // Fallback when tongueOut blendshape is weak
        const EXTREME_MOUTH_OPEN_THRESHOLD = 0.80; // Strong open-mouth fallback for tongue
        const TONGUE_HINT_MIN = 0.02; // Prevent plain open-mouth from being classified as tongue
        const MIN_DETECTION_CONFIDENCE = 0.7;
        const MIN_TRACKING_CONFIDENCE = 0.7;

        // Global variables
        let faceLandmarker;
        let handLandmarker;
        let video;
        let canvas;
        let ctx;
        let memeImage;
        let faceDebug;
        let lastVideoTime = -1;

        // Gesture state tracking
        let currentDisplayedState = 'blank.jpg';
        let gestureHistory = [];
        let noHandFrameCount = 0;
        let showOverlay = true; // Toggle for hand tracking overlay

        // Image states
        const MEME_STATES = {
            BLANK: 'blank.jpg',
            SMILE: 'smile.jpg',
            THINK: 'think.jpg',
            MOUTH: 'mouth.png',
            TONGUE: 'tongue.png',
            FIST: 'fist.png',
            MIDDLE_FINGER: 'middle.png',
            EVIL: 'evil.png'
        };

        // Initialize the application
        async function init() {
            try {
                // Initialize MediaPipe
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
                );

                // Create Face Landmarker
                faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
                        delegate: "GPU"
                    },
                    outputFaceBlendshapes: true,
                    outputFacialTransformationMatrixes: false,
                    runningMode: "VIDEO",
                    numFaces: 1,
                    minDetectionConfidence: MIN_DETECTION_CONFIDENCE,
                    minTrackingConfidence: MIN_TRACKING_CONFIDENCE
                });

                // Create Hand Landmarker - NOW DETECTING 2 HANDS
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO",
                    numHands: 2, // Changed from 1 to 2 to detect both hands
                    minHandDetectionConfidence: MIN_DETECTION_CONFIDENCE,
                    minHandPresenceConfidence: MIN_TRACKING_CONFIDENCE,
                    minTrackingConfidence: MIN_TRACKING_CONFIDENCE
                });

                // Setup video and canvas
                await setupCamera();

                // Get meme image element
                memeImage = document.getElementById('memeImage');
                faceDebug = document.getElementById('faceDebug');

                // Setup toggle button
                const toggleButton = document.getElementById('toggleOverlay');
                toggleButton.addEventListener('click', () => {
                    showOverlay = !showOverlay;
                    if (showOverlay) {
                        toggleButton.textContent = 'TRACKING: ON';
                        toggleButton.classList.remove('off');
                    } else {
                        toggleButton.textContent = 'TRACKING: OFF';
                        toggleButton.classList.add('off');
                    }
                });

                // Start the detection loop
                detectGesture();

            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        // Setup camera
        async function setupCamera() {
            video = document.getElementById('videoElement');
            canvas = document.getElementById('canvasElement');
            ctx = canvas.getContext('2d');

            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    width: VIDEO_WIDTH,
                    height: VIDEO_HEIGHT,
                    facingMode: 'user'
                },
                audio: false
            });

            video.srcObject = stream;
            
            return new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    resolve();
                };
            });
        }

        // Calculate distance between two points in normalized coordinates
        function calculateDistance(point1, point2) {
            const dx = point1.x - point2.x;
            const dy = point1.y - point2.y;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Check if mouth is opened very wide based on lip distance ratio
        function getMouthOpenRatio(faceLandmarks) {
            // MediaPipe face mesh: upper inner lip (13), lower inner lip (14), mouth corners (78, 308)
            const upperInnerLip = faceLandmarks[13];
            const lowerInnerLip = faceLandmarks[14];
            const leftMouthCorner = faceLandmarks[78];
            const rightMouthCorner = faceLandmarks[308];

            const mouthOpenDistance = calculateDistance(upperInnerLip, lowerInnerLip);
            const mouthWidth = calculateDistance(leftMouthCorner, rightMouthCorner);
            if (mouthWidth === 0) return 0;

            return mouthOpenDistance / mouthWidth;
        }

        function isMouthOpenWide(faceLandmarks) {
            const opennessRatio = getMouthOpenRatio(faceLandmarks);
            return opennessRatio > MOUTH_OPEN_WIDE_THRESHOLD;
        }

        function getBlendshapeScore(faceBlendshapes, categoryNames) {
            if (!faceBlendshapes || !faceBlendshapes.categories) return 0;

            for (const category of faceBlendshapes.categories) {
                const name = (category.categoryName || '').toLowerCase();
                if (categoryNames.some((candidate) => name === candidate || name.includes(candidate))) {
                    return category.score;
                }
            }
            return 0;
        }

        // Check if tongue is out using face blendshape signal + mouth openness.
        function isTongueOut(faceBlendshapes, faceLandmarks) {
            const tongueScore = getBlendshapeScore(faceBlendshapes, ['tongueout', 'tongue']);
            const jawOpenScore = getBlendshapeScore(faceBlendshapes, ['jawopen']);
            const mouthOpenRatio = faceLandmarks ? getMouthOpenRatio(faceLandmarks) : 0;

            const directTongue =
                tongueScore > TONGUE_OUT_THRESHOLD &&
                mouthOpenRatio > TONGUE_MOUTH_OPEN_MIN;

            // Fallback path for devices/models where tongueOut stays low.
            const fallbackTongue =
                tongueScore > TONGUE_HINT_MIN &&
                jawOpenScore > JAW_OPEN_THRESHOLD &&
                mouthOpenRatio > EXTREME_MOUTH_OPEN_THRESHOLD;

            return {
                detected: directTongue || fallbackTongue,
                tongueScore,
                jawOpenScore,
                mouthOpenRatio
            };
        }

        // Check if a hand is making a middle finger gesture
        function isMiddleFingerGesture(hand) {
            const wrist = hand[0];

            function isFingerExtended(tipIndex, pipIndex, mcpIndex) {
                const tip = hand[tipIndex];
                const pip = hand[pipIndex];
                const mcp = hand[mcpIndex];

                return (
                    tip.y < pip.y &&
                    pip.y < mcp.y &&
                    calculateDistance(wrist, tip) > calculateDistance(wrist, pip)
                );
            }

            function isFingerFolded(tipIndex, pipIndex) {
                const tip = hand[tipIndex];
                const pip = hand[pipIndex];

                return (
                    tip.y > pip.y ||
                    calculateDistance(wrist, tip) < calculateDistance(wrist, pip)
                );
            }

            // Middle finger should be the only clearly extended finger.
            return (
                isFingerExtended(12, 10, 9) &&
                isFingerFolded(8, 6) &&
                isFingerFolded(16, 14) &&
                isFingerFolded(20, 18)
            );
        }

        // Check if a hand is closed (making a fist)
        function isHandClosed(hand) {
            // Fingertips: thumb (4), index (8), middle (12), ring (16), pinky (20)
            const fingertips = [hand[4], hand[8], hand[12], hand[16], hand[20]];
            const wrist = hand[0];
            
            // Check if all fingertips are close to the wrist/palm
            let totalDistance = 0;
            for (let tip of fingertips) {
                totalDistance += calculateDistance(wrist, tip);
            }
            const avgDistance = totalDistance / fingertips.length;
            
            // Also check if fingertips are close to each other
            let fingertipSpread = 0;
            for (let i = 0; i < fingertips.length; i++) {
                for (let j = i + 1; j < fingertips.length; j++) {
                    fingertipSpread += calculateDistance(fingertips[i], fingertips[j]);
                }
            }
            fingertipSpread = fingertipSpread / (fingertips.length * (fingertips.length - 1) / 2);
            
            // Hand is closed if fingertips are close to wrist AND close to each other
            return avgDistance < 0.15 && fingertipSpread < 0.15;
        }

        // Check if two hands are together (palms facing each other)
        function areHandsTogether(hand1, hand2) {
            // Use multiple points to check if hands are close
            // Points: wrist (0), index base (5), middle base (9), ring base (13), pinky base (17)
            const hand1Points = [hand1[0], hand1[5], hand1[9], hand1[13], hand1[17]];
            const hand2Points = [hand2[0], hand2[5], hand2[9], hand2[13], hand2[17]];
            
            // Calculate average distance between corresponding points
            let totalDistance = 0;
            for (let i = 0; i < hand1Points.length; i++) {
                totalDistance += calculateDistance(hand1Points[i], hand2Points[i]);
            }
            const avgDistance = totalDistance / hand1Points.length;
            
            // Also check the closest distance between any two fingertips
            const fingertips1 = [hand1[4], hand1[8], hand1[12], hand1[16], hand1[20]]; // All fingertips
            const fingertips2 = [hand2[4], hand2[8], hand2[12], hand2[16], hand2[20]];
            
            let minDistance = Infinity;
            for (let tip1 of fingertips1) {
                for (let tip2 of fingertips2) {
                    const dist = calculateDistance(tip1, tip2);
                    if (dist < minDistance) {
                        minDistance = dist;
                    }
                }
            }
            
            // Hands are together if either average palm distance is close OR fingertips are touching
            return avgDistance < HANDS_TOGETHER_THRESHOLD || minDistance < 0.08;
        }

        // Determine the most common gesture in recent history
        function getMostCommonGesture(history) {
            if (history.length === 0) return null;
            
            const counts = {};
            for (let gesture of history) {
                counts[gesture] = (counts[gesture] || 0) + 1;
            }
            
            let maxCount = 0;
            let mostCommon = null;
            for (let gesture in counts) {
                if (counts[gesture] > maxCount) {
                    maxCount = counts[gesture];
                    mostCommon = gesture;
                }
            }
            
            return mostCommon;
        }

        // Detect gesture and render
        async function detectGesture() {
            if (!video || video.readyState !== 4) {
                requestAnimationFrame(detectGesture);
                return;
            }

            const currentTime = performance.now();
            
            // Draw video frame to canvas (mirrored)
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            let detectedGesture = null;
            let handsToVisualize = [];

            // Detect face and hand
            if (video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                const faceResults = faceLandmarker.detectForVideo(video, currentTime);
                const handResults = handLandmarker.detectForVideo(video, currentTime);
                const hasFace = faceResults.faceLandmarks && faceResults.faceLandmarks.length > 0;
                const primaryFaceLandmarks = hasFace ? faceResults.faceLandmarks[0] : null;
                const hasFaceBlendshapes = faceResults.faceBlendshapes && faceResults.faceBlendshapes.length > 0;
                const primaryFaceBlendshapes = hasFaceBlendshapes ? faceResults.faceBlendshapes[0] : null;
                const tongueEvaluation = isTongueOut(primaryFaceBlendshapes, primaryFaceLandmarks);
                const tongueDetected =
                    hasFace &&
                    tongueEvaluation.detected;

                if (faceDebug) {
                    faceDebug.textContent =
                        `tongue: ${tongueEvaluation.tongueScore.toFixed(2)}\n` +
                        `jaw: ${tongueEvaluation.jawOpenScore.toFixed(2)}\n` +
                        `mouth: ${tongueEvaluation.mouthOpenRatio.toFixed(2)}`;
                }

                if (tongueDetected) {
                    detectedGesture = MEME_STATES.TONGUE;
                    noHandFrameCount = 0;
                }

                // Process hand landmarks
                if (!tongueDetected && handResults.landmarks && handResults.landmarks.length > 0) {
                    // Hand detected - reset no-hand counter
                    noHandFrameCount = 0;
                    
                    // Store hands for visualization
                    handsToVisualize = handResults.landmarks;
                    
                    // Check if two hands are detected
                    if (handResults.landmarks.length === 2) {
                        const hand1 = handResults.landmarks[0];
                        const hand2 = handResults.landmarks[1];
                        
                        // Check if hands are together - PRIORITY 1
                        if (areHandsTogether(hand1, hand2)) {
                            detectedGesture = MEME_STATES.EVIL;
                        } else if (isMiddleFingerGesture(hand1) || isMiddleFingerGesture(hand2)) {
                            // One or both hands making middle finger - PRIORITY 2
                            detectedGesture = MEME_STATES.MIDDLE_FINGER;
                        } else if (isHandClosed(hand1) || isHandClosed(hand2)) {
                            // One or both hands making a fist - PRIORITY 3
                            detectedGesture = MEME_STATES.FIST;
                        } else {
                            // Two hands but no other gesture
                            detectedGesture = MEME_STATES.SMILE;
                        }
                    } else {
                        // Only one hand detected
                        const hand = handResults.landmarks[0];
                        
                        // Check if hand is making middle finger - PRIORITY 2
                        if (isMiddleFingerGesture(hand)) {
                            detectedGesture = MEME_STATES.MIDDLE_FINGER;
                        } else if (isHandClosed(hand)) {
                            // Check if hand is closed (fist) - PRIORITY 3
                            detectedGesture = MEME_STATES.FIST;
                        } else if (hasFace) {
                            // Check if face is detected for mouth proximity - PRIORITY 4
                            const upperLip = primaryFaceLandmarks[13];
                            const indexFingerTip = hand[8];
                            const distance = calculateDistance(indexFingerTip, upperLip);

                            if (distance < DISTANCE_THRESHOLD) {
                                detectedGesture = MEME_STATES.THINK;
                            } else {
                                detectedGesture = MEME_STATES.SMILE;
                            }
                        } else {
                            // One hand, no other gestures detected
                            detectedGesture = MEME_STATES.SMILE;
                        }
                    }
                } else if (!tongueDetected) {
                    // No hand: allow wide-open mouth before falling back to blank.
                    if (hasFace && isMouthOpenWide(primaryFaceLandmarks)) {
                        detectedGesture = MEME_STATES.MOUTH;
                        noHandFrameCount = 0;
                    } else {
                        noHandFrameCount++;
                    }
                }
            }

            // Update gesture history when we have any detected gesture
            if (detectedGesture !== null) {
                gestureHistory.push(detectedGesture);
                if (gestureHistory.length > GESTURE_HISTORY_SIZE) {
                    gestureHistory.shift();
                }
            }

            // Determine which state to display with priority logic
            let newState;

            if (detectedGesture === MEME_STATES.TONGUE) {
                // Tongue is often brief, so show immediately when detected.
                newState = MEME_STATES.TONGUE;
            } else if (detectedGesture === MEME_STATES.MOUTH) {
                // Mouth-open should also show immediately instead of waiting on history smoothing.
                newState = MEME_STATES.MOUTH;
            } else if (noHandFrameCount > NO_HAND_THRESHOLD) {
                // Only show blank after many consecutive frames with no hand
                newState = MEME_STATES.BLANK;
                gestureHistory = []; // Clear history when going to blank
            } else if (gestureHistory.length > 0) {
                // If we have recent gesture history, use the most common one
                const mostCommon = getMostCommonGesture(gestureHistory);
                newState = mostCommon || currentDisplayedState;
            } else {
                // Keep current state if no clear signal
                newState = currentDisplayedState;
            }

            // Update displayed state
            if (newState !== currentDisplayedState) {
                currentDisplayedState = newState;
                memeImage.src = newState;
            }

            // Draw hand landmarks and connections
            if (showOverlay) {
                drawHandLandmarks(handsToVisualize);
            }

            // Continue the loop
            requestAnimationFrame(detectGesture);
        }

        // Draw hand skeleton overlay
        function drawHandLandmarks(hands) {
            if (!hands || hands.length === 0) return;

            // Hand connections (finger bones)
            const connections = [
                // Thumb
                [0, 1], [1, 2], [2, 3], [3, 4],
                // Index finger
                [0, 5], [5, 6], [6, 7], [7, 8],
                // Middle finger
                [0, 9], [9, 10], [10, 11], [11, 12],
                // Ring finger
                [0, 13], [13, 14], [14, 15], [15, 16],
                // Pinky
                [0, 17], [17, 18], [18, 19], [19, 20],
                // Palm
                [5, 9], [9, 13], [13, 17]
            ];

            for (let hand of hands) {
                // Draw connections (lines)
                ctx.strokeStyle = '#00FF00';
                ctx.lineWidth = 2;
                ctx.beginPath();
                
                for (let connection of connections) {
                    const start = hand[connection[0]];
                    const end = hand[connection[1]];
                    
                    // Convert normalized coordinates to canvas coordinates (with mirroring)
                    const startX = canvas.width - (start.x * canvas.width);
                    const startY = start.y * canvas.height;
                    const endX = canvas.width - (end.x * canvas.width);
                    const endY = end.y * canvas.height;
                    
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(endX, endY);
                }
                ctx.stroke();

                // Draw landmark points (dots)
                for (let landmark of hand) {
                    const x = canvas.width - (landmark.x * canvas.width);
                    const y = landmark.y * canvas.height;
                    
                    // Draw outer circle
                    ctx.fillStyle = '#00FF00';
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, 2 * Math.PI);
                    ctx.fill();
                    
                    // Draw inner circle for depth effect
                    ctx.fillStyle = '#FFFFFF';
                    ctx.beginPath();
                    ctx.arc(x, y, 2, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        }

        // Start the application
        init();
    </script>
</body>
</html>
